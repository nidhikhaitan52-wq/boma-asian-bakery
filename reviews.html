<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviews - Boma Asian Bakery</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f8f9fa;
}

.review-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

.stars {
    color: #ffc107;
    font-size: 18px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark p-3">
  <a class="navbar-brand" href="index.html">Boma Asian Bakery</a>
  <div>
    <a href="index.html" class="btn btn-outline-light">Home</a>
    <a href="menu.html" class="btn btn-outline-light">Menu</a>
    <a href="about.html" class="btn btn-outline-light">About</a>
    <a href="contact.html" class="btn btn-outline-light">Contact</a>
  </div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Customer Reviews</h2>

<!-- REVIEWS -->

<div id="reviewsList">

<div class="review-card">
<h5>Riya Sharma</h5>
<div class="stars">★★★★★</div>
<p>Amazing desserts! The mochi ice cream was my favorite.</p>
</div>

<div class="review-card">
<h5>Arjun Mehta</h5>
<div class="stars">★★★★☆</div>
<p>Great place to hang out. Loved the bubble tea and ambiance.</p>
</div>

<div class="review-card">
<h5>Neha Gupta</h5>
<div class="stars">★★★★★</div>
<p>The matcha desserts are authentic and delicious!</p>
</div>

</div>

<hr class="my-5">

<!-- ADD REVIEW FORM -->

<h4>Add Your Review</h4>

<input id="name" class="form-control mb-2" placeholder="Your Name">
<textarea id="review" class="form-control mb-2" placeholder="Your Review"></textarea>

<select id="rating" class="form-control mb-3">
  <option value="★★★★★">5 Stars</option>
  <option value="★★★★☆">4 Stars</option>
  <option value="★★★☆☆">3 Stars</option>
</select>

<button class="btn btn-dark" onclick="addReview()">Submit Review</button>

</div>

<script>

function addReview() {
    let name = document.getElementById("name").value;
    let review = document.getElementById("review").value;
    let rating = document.getElementById("rating").value;

    if(name === "" || review === "") {
        alert("Please fill all fields");
        return;
    }

    let newReview = `
    <div class="review-card">
        <h5>${name}</h5>
        <div class="stars">${rating}</div>
        <p>${review}</p>
    </div>
    `;

    document.getElementById("reviewsList").innerHTML += newReview;

    document.getElementById("name").value = "";
    document.getElementById("review").value = "";
}

</script>

</body>
</html>
